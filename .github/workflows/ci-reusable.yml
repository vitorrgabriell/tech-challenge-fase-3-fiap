name: CI Reusable

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service name (e.g. auth-service)"
        required: true
        type: string
      service_path:
        description: "Path to service source code (e.g. services/auth-service)"
        required: true
        type: string
      language:
        description: "Service language: go or python"
        required: true
        type: string
      ecr_repository:
        description: "ECR repository name (e.g. togglemaster/auth-service)"
        required: true
        type: string

jobs:
  # ────────────────────────────────────────────
  # Job 1 — Build & Test
  # ────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Go
      - name: Setup Go
        if: ${{ inputs.language == 'go' }}
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ${{ inputs.service_path }}/go.sum

      - name: Go Build
        if: ${{ inputs.language == 'go' }}
        run: go build ./...

      - name: Go Test
        if: ${{ inputs.language == 'go' }}
        run: go test ./...

      # Python
      - name: Setup Python
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python Install Dependencies
        if: ${{ inputs.language == 'python' }}
        run: pip install -r requirements.txt

      - name: Python Test
        if: ${{ inputs.language == 'python' }}
        run: |
          if [ -d "tests" ] || find . -name "test_*.py" | grep -q .; then
            pip install pytest
            pytest
          else
            echo "No tests found, skipping pytest"
          fi

  # ────────────────────────────────────────────
  # Job 2 — Lint
  # ────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Go
      - name: Setup Go (lint)
        if: ${{ inputs.language == 'go' }}
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ${{ inputs.service_path }}/go.sum

      - name: golangci-lint
        if: ${{ inputs.language == 'go' }}
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: ${{ inputs.service_path }}
          version: latest

      # Python
      - name: Setup Python (lint)
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: flake8
        if: ${{ inputs.language == 'python' }}
        run: |
          pip install flake8
          flake8 .

  # ────────────────────────────────────────────
  # Job 3 — Security Scan (SCA + SAST)
  # ────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # SCA — Trivy filesystem scan (todos os serviços)
      - name: Trivy SCA — filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ inputs.service_path }}
          severity: CRITICAL
          exit-code: "1"

      # SAST Go — gosec
      - name: Setup Go (security)
        if: ${{ inputs.language == 'go' }}
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: ${{ inputs.service_path }}/go.sum

      - name: gosec
        if: ${{ inputs.language == 'go' }}
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

      # SAST Python — bandit
      - name: Setup Python (security)
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: bandit
        if: ${{ inputs.language == 'python' }}
        run: |
          pip install bandit
          bandit -r . -ll --skip B104,B608

  # ────────────────────────────────────────────
  # Job 4 — Docker Build + Container Scan + Push ECR
  # ────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build-and-test, lint, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
          IMAGE_TAG="v1.0.0-${SHORT_SHA}"
          ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${ECR_REGISTRY}/${{ inputs.ecr_repository }}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri_latest=${ECR_REGISTRY}/${{ inputs.ecr_repository }}:latest" >> "$GITHUB_OUTPUT"

      - name: Docker Build
        run: |
          docker build \
            -t "${{ steps.meta.outputs.image_uri }}" \
            -t "${{ steps.meta.outputs.image_uri_latest }}" \
            ${{ inputs.service_path }}

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ steps.meta.outputs.image_uri }}
          severity: CRITICAL
          exit-code: "1"

      - name: Docker Push
        run: |
          docker push "${{ steps.meta.outputs.image_uri }}"
          docker push "${{ steps.meta.outputs.image_uri_latest }}"

  # ────────────────────────────────────────────
  # Job 5 — Update GitOps repo
  # ────────────────────────────────────────────
  update-gitops:
    name: Update GitOps
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/togglemaster-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update image tag in deployment
        run: |
          IMAGE_TAG="${{ needs.docker-build-push.outputs.image_tag }}"
          DEPLOY_FILE="gitops/apps/${{ inputs.service_name }}/deployment.yaml"

          # Matches any existing tag after the last colon on the image: line
          sed -i "s|\(image:.*togglemaster/${{ inputs.service_name }}-service:\)[^ ]*|\1${IMAGE_TAG}|" "$DEPLOY_FILE"

      - name: Commit and push
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/${{ inputs.service_name }}/deployment.yaml
          git diff --cached --quiet && echo "Image tag unchanged, skipping commit." && exit 0
          git commit -m "chore: update ${{ inputs.service_name }} image to ${{ needs.docker-build-push.outputs.image_tag }}"
          git push
